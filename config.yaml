# ════════════════════════════════════════════════════════════════
#  КОНФИГ БОТА — редактируй этот файл для настройки всей логики
#  После изменений: перезапусти бота или задеплой заново
# ════════════════════════════════════════════════════════════════


# ── Модель ──────────────────────────────────────────────────────
model:
  default: "deepseek/deepseek-chat-v3-0324:free"
  temperature: 0.9
  max_output_tokens: 2048

  # Лучшие БЕСПЛАТНЫЕ модели OpenRouter (работают из России):
  #
  #   deepseek/deepseek-chat-v3-0324:free    — быстрая и умная ✅ рекомендуется
  #   deepseek/deepseek-r1:free              — 🔥 умнейшая, думающая (как o1), медленнее
  #   meta-llama/llama-4-maverick:free       — мощная от Meta
  #   meta-llama/llama-4-scout:free          — быстрая от Meta
  #   google/gemma-3-27b-it:free             — от Google, без геоблока
  #   mistralai/mistral-small-3.1-24b-instruct:free — стабильная
  #
  # Менять через /setmodel в Telegram или прямо здесь


# ── Поиск в интернете ───────────────────────────────────────────
search:
  enabled: false
  # Работает через суффикс :online на OpenRouter.
  # Когда включено — бот автоматически ищет актуальную информацию.
  # deepseek/deepseek-chat-v3-0324:free → станет :online при запросе


# ── Память ──────────────────────────────────────────────────────
memory:
  # Краткосрочная (история диалога)
  max_history: 60          # Сообщений в скользящем окне диалога

  # Долгосрочная (постоянная, никогда не удаляется)
  long_term_enabled: true

  # Модель для извлечения фактов (лёгкая, чтобы не тратить лимиты основной)
  extraction_model: "deepseek/deepseek-chat-v3-0324:free"

  # Условия сохранения в долгосрочную память
  # Бот анализирует каждый разговор и решает — сохранять ли факт
  save_conditions:
    - "имя пользователя или как его называть"
    - "предпочтения и вкусы пользователя"
    - "важные факты о жизни пользователя"
    - "профессия, навыки, интересы"
    - "задачи и цели пользователя"
    - "договорённости и обещания"
    # Добавляй свои условия сюда ↓


# ── Системный промпт ────────────────────────────────────────────
# Доступные переменные:
#   {user_name}      — имя пользователя Telegram
#   {chat_title}     — название чата/группы
#   {date}           — текущая дата
#   {time}           — текущее время
#   {long_term}      — блок долгосрочной памяти (вставляется автоматически)
#   {custom.*}       — любые переменные из блока custom_vars ниже
system_prompt: |
  Ты умный и полезный ассистент по имени {custom.bot_name}.
  Сегодня {date}, время {time}.
  Ты общаешься с пользователем {user_name} в чате "{chat_title}".

  {long_term}

  ## Правила общения
  - Отвечай на языке собеседника
  - Будь дружелюбным, но лаконичным
  - Если не знаешь актуальной информации — скажи что поищешь

  ## Дополнительные инструкции
  # Добавляй свои правила сюда ↓


# ── Кастомные переменные ────────────────────────────────────────
# Используй в промпте через {custom.имя_переменной}
custom_vars:
  bot_name: "Харибари"
  language: "русский"
  # Добавляй свои переменные сюда ↓
  # mood: "весёлый"
  # topic_focus: "технологии"


# ── Формат блока долгосрочной памяти ───────────────────────────
# Этот текст оборачивает факты из долгосрочной памяти в промпте
long_term_template: |
  ## Что я знаю об этом пользователе (долгосрочная память)
  {facts}
  ---


# ── Поведение в группах ─────────────────────────────────────────
groups:
  # Отвечать только на @упоминания и реплаи (рекомендуется для групп)
  reply_only_on_mention: true
  # Разрешить /setprompt только администраторам группы
  admin_only_setprompt: true
